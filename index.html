<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTG กำลังยืนยันตัวตน...</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Helvetica Neue',Arial,sans-serif;
  background:linear-gradient(160deg,#020806 0%,#0a1a10 60%,#0d2318 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px
}
.box{text-align:center;color:#fff;width:100%;max-width:360px}
.line-logo{width:80px;height:80px;background:#06C755;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 0 12px rgba(6,199,85,.15)}
.line-logo svg{width:48px;height:48px}
h2{font-size:24px;font-weight:700;margin-bottom:8px}
p{font-size:15px;color:rgba(255,255,255,.55);margin-bottom:28px;line-height:1.6}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.12);border-top-color:#06C755;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#status{font-size:14px;color:rgba(255,255,255,.5);min-height:20px}
#errBox{margin-top:20px;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);border-radius:12px;padding:16px;display:none}
#errMsg{color:#f87171;font-size:14px;line-height:1.6;margin-bottom:12px}
.btn-retry{padding:10px 24px;background:#06C755;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="box">
  <div class="line-logo">
    <svg viewBox="0 0 48 48" fill="white">
      <path d="M24 4C13 4 4 11.8 4 21.4c0 8.5 7.5 15.6 17.7 17.1.7.1 1.6.5 1.8 1 .2.5.1 1.3.1 1.3l-.3 1.8c-.1.5-.4 2 1.7 1.1 2.1-.9 11.4-6.7 15.6-11.5C43.3 28.5 44 25.1 44 21.4 44 11.8 35 4 24 4z"/>
    </svg>
  </div>
  <h2>PTG Logistics</h2>
  <p>ระบบบันทึกการทำงาน<br>กำลังยืนยันตัวตนผ่าน LINE...</p>
  <div class="spinner"></div>
  <div id="status">กำลังเชื่อมต่อ...</div>
  <div id="errBox">
    <div id="errMsg"></div>
    <button class="btn-retry" onclick="location.reload()">🔄 ลองใหม่</button>
  </div>
</div>

<script>
var LIFF_ID = '2010021125-jKsq9Dox';
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyJqTibRnTWua7x-WX6VC61IcwqdLgmsAYn1dKYTftfuheXdfmhQ2sgOHmgkPRNjia9/exec';

function setStatus(msg){
  document.getElementById('status').textContent = msg;
}

function showError(msg){
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errBox').style.display = 'block';
  document.querySelector('.spinner').style.display = 'none';
}

liff.init({ liffId: LIFF_ID })
  .then(function(){
    setStatus('เชื่อมต่อสำเร็จ...');
    if(!liff.isLoggedIn()){
      setStatus('กำลังพาไป Login LINE...');
      liff.login({ redirectUri: location.href });
      return null;
    }
    setStatus('กำลังดึงข้อมูลโปรไฟล์...');
    return liff.getProfile();
  })
  .then(function(profile){
    if(!profile) return;
    setStatus('ยืนยันสำเร็จ กำลังเข้าสู่ระบบ...');
    // redirect ไป GAS พร้อม LINE User ID
    var url = GAS_URL + '?uid=' + encodeURIComponent(profile.userId)
                      + '&name=' + encodeURIComponent(profile.displayName);
    location.href = url;
  })
  .catch(function(err){
    showError('เกิดข้อผิดพลาด: ' + err.message + '\n\nกรุณากดลองใหม่ หรือติดต่อผู้ดูแลระบบ');
  });
</script>
</body>
</html>
